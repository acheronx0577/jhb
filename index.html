<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Life Plus+ · Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="login.css"/>
</head>
<body>

<div class="card">

  <!-- LEFT -->
  <div class="left">
    <div class="badge"><div class="dot"></div>Member Portal · 2026</div>

    <div class="hero">
      FEEL<br>
      <span class="outline">YOUR</span><br>
      <span class="coral">BEST.</span>
    </div>

    <div class="tile-row">
      <div class="tile">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9BC1BC" stroke-width="2" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <span class="tlabel">Vitals</span>
      </div>
      <div class="tile">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ED6A5A" stroke-width="2" stroke-linecap="round"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
        <span class="tlabel">Progress</span>
      </div>
      <div class="tile">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#F4F1BB" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        <span class="tlabel">Streak</span>
      </div>
      <div class="tile">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9BC1BC" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
        <span class="tlabel">Community</span>
      </div>
    </div>

    <p class="left-foot">Life+Plus+ · Feel your best every day</p>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div>
      <p class="heading" id="form-heading">Welcome <span>Back.</span></p>
      <p class="sub" id="form-sub">Sign in to continue your journey</p>
    </div>

    <div class="tabs">
      <button class="tab on" data-tab="signin">Sign In</button>
      <button class="tab off" data-tab="signup">Sign Up</button>
    </div>

    <div class="social-row">
      <button class="sb sb-g">
        <svg class="g-ico" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Google
      </button>
      <button class="sb sb-a">
        <svg class="a-ico" viewBox="0 0 24 24" fill="white"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        Apple
      </button>
    </div>

    <div class="divider">or email</div>

    <div class="field" id="identifier-field">
      <label id="identifier-label">Email, phone or username</label>
      <input class="fi" id="identifier-input" type="text" placeholder="Enter your email, phone or username"/>
    </div>

    <!-- Sign Up only fields — sit between email and password -->
    <div class="signup-fields" id="signup-fields">
      <div class="field">
        <label>Username <span class="optional">optional</span></label>
        <input class="fi" type="text" placeholder="@yourhandle"/>
      </div>
      <div class="field">
        <label>Phone number <span class="optional">optional</span></label>
        <input class="fi" type="tel" placeholder="+1 (000) 000-0000"/>
      </div>
    </div>

    <div class="field">
      <label>Password</label>
      <input class="fi" type="password" placeholder="••••••••"/>
    </div>

    <button class="btn" id="form-btn">Enter →</button>
  </div>

</div>

<script src="login.js"></script>
</body>
</html>
